<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任務日程規劃器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div>
                <p class="app-subtitle">日程規劃 / 任務欄</p>
                <h1>冒險日誌</h1>
            </div>
            <div class="header-badge">管理者模式</div>
        </header>

        <main class="layout">
            <section class="panel quest-panel">
                <div class="panel-header">
                    <div>
                        <p class="panel-label">任務欄</p>
                        <h2>今日待辦任務</h2>
                    </div>
                    <div class="summary-badge">
                        <span id="taskCount">0</span> 個任務
                    </div>
                </div>
                <div id="taskList" class="task-list"></div>
            </section>

            <aside class="panel form-panel">
                <div class="panel-header">
                    <div>
                        <p class="panel-label">右側新增區</p>
                        <h2>新增任務</h2>
                    </div>
                </div>

                <form id="taskForm" class="task-form">
                    <div class="field-group">
                        <label for="taskTitle">任務標題</label>
                        <input
                            type="text"
                            id="taskTitle"
                            placeholder="例如：完成專案報告"
                            required
                        >
                    </div>
                    <div class="field-group">
                        <label for="taskTime">預定時間</label>
                        <input
                            type="datetime-local"
                            id="taskTime"
                            required
                        >
                    </div>
                    <div class="field-group">
                        <label for="taskNotes">備註 / 任務說明</label>
                        <textarea
                            id="taskNotes"
                            rows="4"
                            placeholder="例如：上午10點與團隊會議"
                        ></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        新增任務
                    </button>
                </form>

                <div class="hint-card">
                    <p>
                        新增後任務會立即出現在左側任務欄中。
                        可標記完成或刪除任務。
                    </p>
                </div>
            </aside>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
